    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          background-color: #000C17;
          font-family: 'Montserrat', sans-serif;
        }

        #loading-screen {
          position: fixed;
          inset: 0;
          background-color: #000C17;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loading-screen.hidden {
          opacity: 0;
          visibility: hidden;
        }

        .loading-logo {
          font-family: 'Montserrat', sans-serif;
          font-size: 28px;
          font-weight: 800;
          color: #FFFFFF;
          letter-spacing: 2px;
          margin-bottom: 32px;
        }

        .loading-logo span {
          color: #1A73E8;
        }

        .loading-spinner {
          width: 40px;
          height: 40px;
          border: 3px solid #0A1628;
          border-top-color: #1A73E8;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }

        .loading-tagline {
          margin-top: 20px;
          font-size: 13px;
          color: #B0BEC5;
          letter-spacing: 1px;
        }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }
    </style>

<!-- Загрузочный экран — скрывается после инициализации Flutter -->
<div id="loading-screen">
    <div class="loading-logo">TITAN <span>SECURITY</span></div>
    <div class="loading-spinner"></div>
    <div class="loading-tagline">Безопасность, которой можно доверять</div>
</div>

<script>
    // Скрываем загрузочный экран как только Flutter готов
    window.addEventListener('flutter-first-frame', function () {
      const screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('hidden');
        setTimeout(() => screen.remove(), 500);
      }
    });
</script>

<!-- Flutter bootstrap — современный способ запуска (Flutter 3.x+) -->
<script src="flutter_bootstrap.js" async></script>

</body>
